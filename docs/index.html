<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Activity (Weekly OHLC)</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chart-container {
            width: 90%;
            max-width: 1000px;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 5px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="header">
            <h1 class="title">LeetCode Activity (Weekly OHLC)</h1>
            <div class="subtitle">Interactive visualization of problem-solving consistency</div>
        </div>
        <div id="candlestick-chart"></div>
    </div>

    <script>
        // Fetch the perfectly generated OHLC data from the repo's assets!
        // GitHub pages serves from /docs/ so assets is at ../assets/
        fetch('../assets/leetcode_ohlc.json')
            .then(response => response.json())
            .then(data => {
                
                // ApexCharts format: { x: process_date, y: [O, H, L, C] }
                const seriesData = data.map(item => ({
                    x: item.date,
                    y: [item.open, item.high, item.low, item.close]
                }));

                const options = {
                    series: [{
                        name: 'Solves',
                        data: seriesData
                    }],
                    chart: {
                        type: 'candlestick',
                        height: 450,
                        background: 'transparent',
                        toolbar: {
                            show: true,
                            tools: { download: true, selection: true, zoom: true, pan: true }
                        },
                        animations: { enabled: true, easing: 'easeinout', speed: 800 }
                    },
                    theme: { mode: 'dark' },
                    plotOptions: {
                        candlestick: {
                            colors: {
                                upward: '#00ff41',
                                downward: '#ff0000'
                            },
                            wick: { useFillColor: true }
                        }
                    },
                    xaxis: {
                        type: 'category',
                        labels: {
                            style: { colors: '#8b949e', fontFamily: 'Inter' }
                        },
                        axisBorder: { color: '#30363d' },
                        axisTicks: { color: '#30363d' }
                    },
                    yaxis: {
                        tooltip: { enabled: true },
                        labels: {
                            style: { colors: '#8b949e', fontFamily: 'Inter' }
                        }
                    },
                    grid: {
                        borderColor: '#21262d',
                        strokeDashArray: 4,
                    },
                    tooltip: {
                        theme: 'dark',
                        style: { fontFamily: 'Inter' }
                    }
                };

                const chart = new ApexCharts(document.querySelector("#candlestick-chart"), options);
                chart.render();
            })
            .catch(err => {
                console.error("Error fetching data:", err);
                document.getElementById('candlestick-chart').innerHTML = 
                    "<div style='text-align:center; padding: 50px; color: #ff0000;'>" +
                    "Could not load chart data. Ensure GitHub action has run.</div>";
            });
    </script>
</body>
</html>
